<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stained Glass Detector - Распознавание святых</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=2">
</head>
<body>
    <div class="bg-photo" aria-hidden="true"></div>
    <div class="bg-veil" aria-hidden="true"></div>

    <div class="container">
        <header>
            <h1>Stained Glass Detector</h1>
            <p>Распознавание святых на витражах с помощью YOLOv8</p>
        </header>

        <div class="upload-section">
            <label for="imageInput" class="upload-btn">
                Выберите изображение
            </label>
            <input type="file" id="imageInput" accept="image/*">
            <p id="statusText" style="margin-top:10px; color:#aaa; font-size:0.9rem;">
                Статус: Ожидание загрузки
            </p>
        </div>

        <div id="previewContainer" style="display:none;">
            <div class="image-wrapper">
                <img id="preview" alt="Загруженное изображение">
            </div>
        </div>

        <div id="result" class="result-card">
            <h2 id="saintName">Загрузите изображение</h2>
            <p id="saintDescription"></p>
        </div>

        <footer>
            <p>YOLOv8-seg · ONNX Runtime</p>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.17.1/dist/ort.min.js">
    </script>
    <script src="app.js?v=3"></script>
</body>
</html>
